<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>regalo</title>

<style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffeef2 0%, #ffd1dc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Card centrale in verticale */
        .card {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(227, 93, 129, 0.2);
            padding: 40px 25px;
            max-width: 420px;
            width: 100%;
            backdrop-filter: blur(5px);

            /* Disposizione verticale degli elementi */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 25px; /* Spazio uniforme tra i blocchi */
            
            /* Piccola animazione all'apertura */
            animation: fadeIn 0.8s ease-out;
        }

        h2 {
            color: #665559;
            font-size: 1.05rem;
            line-height: 1.6;
            font-weight: 400;
        }

        h1 {
            color: #d6336c;
            font-size: 2.1rem;
            font-weight: 700;
            line-height: 1.2;
        }

        a {
            text-decoration: none;
            width: 100%; /* Fa adattare il link al contenitore */
            display: flex;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #ff4b72 0%, #d6336c 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(214, 51, 108, 0.4);
            transition: all 0.3s ease;
            width: 100%;
            max-width: 280px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(214, 51, 108, 0.6);
            background: linear-gradient(135deg, #d6336c 0%, #b82559 100%);
        }

        button:active {
            transform: translateY(1px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body align="center">
    <div class="card">
    <h2>un piccolo sito che però ho fatto con tanta voglia e amore</h2>
    <h1>per claudia l'amore mio💙💙💙</h1>
    <a href="pagina.html">
        <button type="button">Clicca qui per entrare</button>
    </a>
    </div>
</body>
</html>
